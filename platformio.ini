; PlatformIO Project Configuration File for ESP32 DLNA and Bluetooth Speaker

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -std=gnu++17

build_unflags =
    -std=gnu++11

; Partition scheme for Bluetooth
board_build.partitions = default.csv

; Libraries
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    earlephilhower/ESP8266Audio@1.9.7

; Filesystem for configuration
board_build.filesystem = littlefs

; Upload settings
upload_speed = 921600
